{% extends "base.html" %}

{% block title %}Student Identity Search{% endblock %}

{% block content %}

<section class="bg-white p-6 rounded-xl id-card-shadow border border-gray-200">
    <h1 class="font-heading text-2xl font-bold text-primary mb-6">Retrieve Student Identity</h1>

    <form method="post" class="flex flex-col md:flex-row gap-4 md:items-end">
        {% csrf_token %}
        <div class="flex-1">
            <label for="student_id" class="block text-xs uppercase tracking-widest font-semibold text-gray-600 mb-2">
                Student ID
            </label>
            <input
                type="text"
                id="student_id"
                name="student_id"
                value="{{ query }}"
                placeholder="e.g. 11-3335 or ١١-٣٣٣٥"
                autofocus
                class="w-full h-12 px-4 rounded-lg border border-gray-400 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all">
        </div>

        <button type="submit"
            class="bg-secondary text-white px-8 h-12 rounded-lg font-bold uppercase tracking-widest hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
            Search
            <span class="material-symbols-outlined text-[18px]">search</span>
        </button>
    </form>
</section>

{% if student %}

    {% include "students/components/student_card.html" %}

{% elif query %}

    <div class="mt-8 rounded-lg border border-red-200 bg-red-50 p-4 text-center text-red-700">
        No student found with ID <strong>{{ query }}</strong>.
    </div>

{% endif %}

{% endblock %}
