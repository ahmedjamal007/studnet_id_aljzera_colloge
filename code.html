<script>
        // Micro-interaction for input field focus
        const inputField = document.getElementById('university-number');
        const container = inputField.closest('.bg-surface-container-lowest');
        
        inputField.addEventListener('focus', () => {
            container.classList.add('ring-2', 'ring-primary/5');
        });
        
        inputField.addEventListener('blur', () => {
            container.classList.remove('ring-2', 'ring-primary/5');
        });

        // Simple button active state visual feedback
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.opacity = '0.8';
                btn.style.transform = 'scale(0.98)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.opacity = '1';
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
